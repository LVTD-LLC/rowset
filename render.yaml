services:
  - type: web
    # These names assume the Render resources have already been renamed or
    # migrated. For an existing deployment, update every service/database name
    # in this file to match the current Render resource identifiers before
    # applying the blueprint.
    name: rowset-web
    runtime: python
    buildCommand: |
      pip install -r requirements.txt &&
      npm ci &&
      npm run build &&
      python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn rowset.asgi:application --bind 0.0.0.0:$PORT --workers 2 --worker-class uvicorn_worker.UvicornWorker --timeout 120
    plan: free
    healthCheckPath: /

    envVars:
      - fromGroup: app-env
      - key: POSTGRES_DB
        fromDatabase:
          name: rowset-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: rowset-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: rowset-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: rowset-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: rowset-db
          property: port
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: rowset-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: rowset-redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          type: keyvalue
          name: rowset-redis
          property: password

  - type: web
    # Keep this aligned with the existing worker service identifier in Render.
    name: rowset-workers
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
    startCommand: python manage.py qcluster & python -m http.server $PORT
    plan: free
    healthCheckPath: /

    envVars:
      - fromGroup: app-env
      - key: POSTGRES_DB
        fromDatabase:
          name: rowset-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: rowset-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: rowset-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: rowset-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: rowset-db
          property: port
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: rowset-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: rowset-redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          type: keyvalue
          name: rowset-redis
          property: password

  - type: keyvalue
    # Keep this aligned with the existing Redis resource identifier in Render.
    name: rowset-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lfu

databases:
  # Keep this aligned with the existing Postgres resource identifier in Render.
  - name: rowset-db
    databaseName: rowset
    user: rowset_user
    plan: free


envVarGroups:
  - name: app-env
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: ENVIRONMENT
        value: prod
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true

      # Site URL - auto-generated by Render
      - key: SITE_URL
        value: $RENDER_EXTERNAL_URL

      # Set to False to pause new account creation while keeping existing logins working.
      - key: ALLOW_SIGNUPS
        value: "True"

      
      # Optional. If not specified, local FileSystemStorage is used for media files.
      - key: AWS_S3_ENDPOINT_URL
        value: ""
      # Required when AWS_S3_ENDPOINT_URL is set outside local development.
      # Set this to the existing bucket name until object storage is renamed or migrated.
      - key: AWS_STORAGE_BUCKET_NAME
        value: ""
      - key: AWS_ACCESS_KEY_ID
        value: ""
      - key: AWS_SECRET_ACCESS_KEY
        value: ""
      

      # Basic email setup - can be configured later
      - key: MAILGUN_API_KEY
        value: ""

      # Redis Database Number
      - key: REDIS_DB
        value: "0"
