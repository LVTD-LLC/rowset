name: rowset

services:
  db:
    image: rasulkireev/custom-postgres:18
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${ROWSET_POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=rowset
      - POSTGRES_USER=rowset
      - POSTGRES_PASSWORD=rowset
    healthcheck:
      # The Postgres image starts a temporary server while initializing. Wait until
      # postgres itself is PID 1 so migrations never run against that disposable server.
      test: ["CMD-SHELL", "test \"$$(cat /proc/1/comm)\" = postgres && pg_isready -U rowset -d rowset"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass rowset
    ports:
      - "${ROWSET_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=rowset

  backend:
    build:
      context: .
      dockerfile: Dockerfile-python
    working_dir: /app
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "${ROWSET_APP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8000/ >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    env_file:
      - .env

  workers:
    build:
      context: .
      dockerfile: Dockerfile-python
    working_dir: /app
    command: python manage.py qcluster
    volumes:
      - .:/app
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env

  frontend:
    image: node:24
    working_dir: /app
    command: sh -c "npm install && npm run start"
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/frontend/build/manifest.json"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  mailhog:
    image: mailhog/mailhog
    expose:
      - 1025
      - 8025
    ports:
      - "${ROWSET_SMTP_PORT:-1025}:1025"
      - "${ROWSET_MAILHOG_PORT:-8025}:8025"

  stripe:
    image: stripe/stripe-cli:latest
    command: [
      "listen",
      "--forward-to", "http://backend:8000/stripe/webhook/"
    ]
    environment:
      - STRIPE_API_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_DEVICE_NAME=cleanapp_docker
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - .env
  

  mjml:
    image: danihodovic/mjml-server
    ports:
      - "${ROWSET_MJML_PORT:-15500}:15500"
  

  minio:
    image: minio/minio
    ports:
      - "${ROWSET_MINIO_API_PORT:-9000}:9000"
      - "${ROWSET_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: rowset-user
      MINIO_ROOT_PASSWORD: rowset-password
    command: server --console-address ":9001" /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 3

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5 &&
      /usr/bin/mc config host add myminio http://minio:9000 rowset-user rowset-password &&
      /usr/bin/mc mb --ignore-existing myminio/rowset-dev &&
      /usr/bin/mc mb --ignore-existing myminio/rowset-assets-dev &&
      /usr/bin/mc anonymous set download myminio/rowset-dev &&
      exit 0;
      "
  

volumes:
  postgres_data:
  redis_data:
  minio_data:
  
