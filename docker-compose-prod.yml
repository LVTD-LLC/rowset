x-service-defaults: &service-defaults
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  caddy:
    <<: *service-defaults
    image: caddy:2.11.4-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    configs:
      - source: rowset_caddyfile
        target: /etc/caddy/Caddyfile
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy

  db:
    <<: *service-defaults
    image: rasulkireev/custom-postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    env_file:
      - .env

  redis:
    <<: *service-defaults
    image: redis:7-alpine
    command:
      - sh
      - -c
      - 'test -n "$$REDIS_PASSWORD" || { echo "REDIS_PASSWORD is required" >&2; exit 1; }; exec redis-server --requirepass "$$REDIS_PASSWORD"'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", 'test -n "$$REDIS_PASSWORD" && REDISCLI_AUTH="$$REDIS_PASSWORD" redis-cli ping']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s
    env_file:
      - .env

  qdrant:
    <<: *service-defaults
    image: qdrant/qdrant:v1.18.2
    profiles:
      - vector-search
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?Set QDRANT_API_KEY in .env}
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333;
          printf "GET /healthz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3;
          grep -q "200 OK" <&3'
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s

  backend:
    <<: *service-defaults
    image: ${ROWSET_IMAGE:?Set ROWSET_IMAGE to a verified release or SHA tag}
    working_dir: /app
    expose:
      - 80
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_PROCESS_TYPE: server
      SITE_URL: https://${ROWSET_DOMAIN:?Set ROWSET_DOMAIN to the public hostname}
    volumes:
      - media_data:/app/media
      - private_media_data:/app/private_media

  workers:
    <<: *service-defaults
    image: ${ROWSET_IMAGE:?Set ROWSET_IMAGE to a verified release or SHA tag}
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_PROCESS_TYPE: worker
      SITE_URL: https://${ROWSET_DOMAIN:?Set ROWSET_DOMAIN to the public hostname}
    volumes:
      - media_data:/app/media
      - private_media_data:/app/private_media

configs:
  rowset_caddyfile:
    content: |
      ${ROWSET_DOMAIN:?Set ROWSET_DOMAIN to the public hostname} {
          request_body {
              max_size 64MB
          }
          reverse_proxy backend:80 {
              flush_interval -1
          }
      }

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  qdrant_data:
  media_data:
  private_media_data:
