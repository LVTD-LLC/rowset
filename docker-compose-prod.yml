# docker compose -f docker-compose-prod.yml -p rowset up --detach --remove-orphans

x-service-defaults: &service-defaults
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  db:
    <<: *service-defaults
    image: rasulkireev/custom-postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    env_file:
      - .env

  redis:
    <<: *service-defaults
    image: redis:7-alpine
    command:
      - sh
      - -c
      - 'test -n "$$REDIS_PASSWORD" || { echo "REDIS_PASSWORD is required" >&2; exit 1; }; exec redis-server --requirepass "$$REDIS_PASSWORD"'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", 'test -n "$$REDIS_PASSWORD" && REDISCLI_AUTH="$$REDIS_PASSWORD" redis-cli ping']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s
    env_file:
      - .env

  backend:
    <<: *service-defaults
    image: ${ROWSET_IMAGE:?Set ROWSET_IMAGE to a verified release or SHA tag}
    working_dir: /app
    ports:
      - "8000:80"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_PROCESS_TYPE: server
    volumes:
      - media_data:/app/media
      - private_media_data:/app/private_media

  workers:
    <<: *service-defaults
    image: ${ROWSET_IMAGE:?Set ROWSET_IMAGE to a verified release or SHA tag}
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_PROCESS_TYPE: worker
    volumes:
      - media_data:/app/media
      - private_media_data:/app/private_media

volumes:
  postgres_data:
  redis_data:
  media_data:
  private_media_data:
