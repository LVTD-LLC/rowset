# docker-compose -f docker-compose-prod.yml -p "rowset" up --detach --remove-orphans || true

services:
  caddy:
    image: caddy:2.11.4-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      ROWSET_SITE_ADDRESS: ${ROWSET_DOMAIN:?Set ROWSET_DOMAIN to the public hostname}
    volumes:
      - ./deployment/self-host/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy

  db:
    image: rasulkireev/custom-postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    env_file:
      - .env

  backend:
    image: ${ROWSET_IMAGE:?Set ROWSET_IMAGE to a verified release or SHA tag}
    working_dir: /app
    expose:
      - 80
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      APP_PROCESS_TYPE: server
      SITE_URL: https://${ROWSET_DOMAIN:?Set ROWSET_DOMAIN to the public hostname}
    volumes:
      - media_data:/app/media
      - private_media_data:/app/private_media

  workers:
    image: ${ROWSET_IMAGE:?Set ROWSET_IMAGE to a verified release or SHA tag}
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      APP_PROCESS_TYPE: worker
      SITE_URL: https://${ROWSET_DOMAIN:?Set ROWSET_DOMAIN to the public hostname}
    volumes:
      - media_data:/app/media
      - private_media_data:/app/private_media

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  media_data:
  private_media_data:
