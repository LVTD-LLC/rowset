# docker-compose -f docker-compose-prod.yml -p "rowset" up --detach --remove-orphans || true

services:
  db:
    image: rasulkireev/custom-postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    env_file:
      - .env

  backend:
    image: ghcr.io/lvtd-llc/rowset:latest
    working_dir: /app
    ports:
      - "8000:80"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      APP_PROCESS_TYPE: server
    volumes:
      - media_data:/app/media
      - private_media_data:/app/private_media

  workers:
    image: ghcr.io/lvtd-llc/rowset:latest
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      APP_PROCESS_TYPE: worker
    volumes:
      - media_data:/app/media
      - private_media_data:/app/private_media

volumes:
  postgres_data:
  redis_data:
  media_data:
  private_media_data:
