name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: rasulkireev/custom-postgres:18
        env:
          POSTGRES_DB: rowset
          POSTGRES_USER: rowset
          POSTGRES_PASSWORD: rowset
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rowset -d rowset"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      ENVIRONMENT: test
      DJANGO_READ_DOT_ENV: "0"
      DEBUG: "0"
      SECRET_KEY: test-secret-key
      SITE_URL: "https://testserver"
      ALLOWED_HOSTS: "localhost,127.0.0.1"

      POSTGRES_DB: rowset
      POSTGRES_USER: rowset
      POSTGRES_PASSWORD: rowset
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432

      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0

      # Avoid external email providers in CI
      MAILGUN_API_KEY: ""
      AWS_S3_ENDPOINT_URL: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.29"

      - name: Set up Python (uv-managed)
        run: uv python install 3.14

      - name: Sync dependencies
        run: uv sync

      - name: Ruff lint
        run: make lint-python

      - name: Ruff format check
        run: make format-check

      - name: Create dummy webpack manifest (tests)
        run: |
          mkdir -p frontend/build
          cat > frontend/build/manifest.json <<'EOF'
          {
            "entrypoints": {
              "index": {
                "assets": {
                  "js": [],
                  "css": []
                }
              }
            }
          }
          EOF

      - name: Migrations check
        run: make migrations-check CHECK_PYTHON_RUN="uv run python"

      - name: Django checks
        run: make django-check CHECK_PYTHON_RUN="uv run python"

      - name: Pytest (with slow-test report)
        run: make test PYTEST_RUN="uv run pytest" -- -q --durations=25

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install frontend dependencies
        run: make frontend-install

      - name: Frontend lint and build
        run: make frontend-check

  cli:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: CLI test and build
        run: |
          make cli-test
          make cli-build
