name: Publish

on:
  push:
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]-[0-9]*"
  workflow_call:
    inputs:
      release_tag:
        description: Immutable dotted-date release tag.
        required: true
        type: string
      release_sha:
        description: Exact deployed main commit to publish.
        required: true
        type: string

concurrency:
  group: rowset-release-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  PROJECT_NAME: rowset

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
      release_sha: ${{ steps.release.outputs.release_sha }}
      image_name: ${{ steps.release.outputs.image_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_sha || github.sha }}

      - name: Prepare release metadata
        id: release
        shell: bash
        env:
          RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
          RELEASE_SHA_INPUT: ${{ inputs.release_sha }}
        run: |
          release_tag="${RELEASE_TAG_INPUT:-$GITHUB_REF_NAME}"
          release_sha="${RELEASE_SHA_INPUT:-$GITHUB_SHA}"
          if [[ ! "$release_tag" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}-[0-9]+$ ]]; then
            echo "Release tag must match YYYY.MM.DD-N, for example 2026.07.08-0." >&2
            exit 1
          fi
          if [[ ! "$release_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Release SHA must be a full 40-character commit SHA." >&2
            exit 1
          fi
          git cat-file -e "${release_sha}^{commit}"
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_sha=${release_sha}" >> "$GITHUB_OUTPUT"
          echo "image_name=${image_name}" >> "$GITHUB_OUTPUT"

  cli:
    name: Build CLI (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    env:
      RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.release_sha }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Test CLI
        working-directory: cli
        run: go test ./...

      - name: Build CLI archive
        shell: bash
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist package
          go build \
            -trimpath \
            -ldflags "-s -w -X github.com/LVTD-LLC/rowset/cli/internal/rowsetcli.Version=${RELEASE_TAG}" \
            -o package/rowset \
            ./cmd/rowset
          asset="rowset_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tar -C package -czf "dist/${asset}" rowset

      - name: Upload CLI archive
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cli/dist/*.tar.gz
          if-no-files-found: error

  app-image:
    name: Build and publish app image
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.release_sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve immutable image digest
        id: image
        shell: bash
        timeout-minutes: 15
        env:
          IMAGE_DIGEST_RESOLVE_ATTEMPTS: "60"
          IMAGE_DIGEST_RESOLVE_DELAY_SECONDS: "10"
        run: |
          digest="$(deployment/resolve-image-digest.sh \
            "${{ needs.validate.outputs.image_name }}:${{ needs.validate.outputs.release_sha }}")"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Verify published platforms
        run: deployment/verify-image-platforms.sh "${{ needs.validate.outputs.image_name }}:${{ needs.validate.outputs.release_sha }}" linux/amd64 linux/arm64

      - name: Smoke published platforms
        run: deployment/smoke-image-platforms.sh "${{ needs.validate.outputs.image_name }}:${{ needs.validate.outputs.release_sha }}"

      - name: Verify anonymous immutable image availability
        timeout-minutes: 15
        run: |
          deployment/verify-anonymous-image.sh \
            "${{ steps.image.outputs.digest }}" \
            "${{ needs.validate.outputs.image_name }}:${{ needs.validate.outputs.release_sha }}"

      - name: Log in to GHCR for tag promotion
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Protect immutable release tag
        run: |
          deployment/verify-immutable-image-tag.sh \
            "${{ steps.image.outputs.digest }}" \
            "${{ needs.validate.outputs.image_name }}:${{ needs.validate.outputs.release_tag }}"

      - name: Promote advertised tags
        run: |
          docker buildx imagetools create \
            --tag "${{ needs.validate.outputs.image_name }}:${{ needs.validate.outputs.release_tag }}" \
            "${{ needs.validate.outputs.image_name }}@${{ steps.image.outputs.digest }}"

      - name: Verify anonymous image availability
        timeout-minutes: 15
        run: |
          deployment/verify-anonymous-image.sh \
            "${{ steps.image.outputs.digest }}" \
            "${{ needs.validate.outputs.image_name }}:${{ needs.validate.outputs.release_sha }}" \
            "${{ needs.validate.outputs.image_name }}:${{ needs.validate.outputs.release_tag }}"

  release:
    name: Create GitHub release
    needs:
      - validate
      - cli
      - app-image
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
      RELEASE_SHA: ${{ needs.validate.outputs.release_sha }}
      IMAGE_NAME: ${{ needs.validate.outputs.image_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.release_sha }}

      - name: Download CLI archives
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          path: release-assets
          merge-multiple: true

      - name: Prepare release assets
        shell: bash
        run: |
          cp scripts/install-rowset-cli.sh release-assets/install-rowset-cli.sh
          (cd release-assets && sha256sum *.tar.gz > checksums.txt)

      - name: Publish release
        shell: bash
        run: |
          notes="$(mktemp)"
          {
            echo "Rowset release ${RELEASE_TAG}"
            echo
            echo "Docker image:"
            echo
            echo "- ${IMAGE_NAME}:${RELEASE_TAG}"
            echo
            echo "Self-hosting:"
            echo
            echo "- https://github.com/${GITHUB_REPOSITORY}/blob/${RELEASE_TAG}/SELF_HOSTING.md"
            echo
            echo "Install the CLI:"
            echo
            echo '```bash'
            echo "curl -fsSL https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/install-rowset-cli.sh | sh"
            echo '```'
          } > "$notes"

          gh release create "$RELEASE_TAG" release-assets/* \
            --target "$RELEASE_SHA" \
            --title "$RELEASE_TAG" \
            --notes-file "$notes"
