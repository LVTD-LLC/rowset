name: Publish

on:
  push:
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]-[0-9]*"

concurrency:
  group: rowset-release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  PROJECT_NAME: rowset

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
      image_name: ${{ steps.release.outputs.image_name }}
    steps:
      - name: Prepare release metadata
        id: release
        shell: bash
        run: |
          release_tag="${GITHUB_REF_NAME}"
          if [[ ! "$release_tag" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}-[0-9]+$ ]]; then
            echo "Release tag must match YYYY.MM.DD-N, for example 2026.07.08-0." >&2
            exit 1
          fi
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "image_name=${image_name}" >> "$GITHUB_OUTPUT"

  cli:
    name: Build CLI (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    env:
      RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Test CLI
        working-directory: cli
        run: go test ./...

      - name: Build CLI archive
        shell: bash
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist package
          go build \
            -trimpath \
            -ldflags "-s -w -X github.com/LVTD-LLC/rowset/cli/internal/rowsetcli.Version=${RELEASE_TAG}" \
            -o package/rowset \
            ./cmd/rowset
          asset="rowset_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tar -C package -czf "dist/${asset}" rowset

      - name: Upload CLI archive
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cli/dist/*.tar.gz
          if-no-files-found: error

  app-image:
    name: Build and publish app image
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ needs.validate.outputs.image_name }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.title=${{ env.PROJECT_NAME }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Verify published platforms
        run: deployment/verify-image-platforms.sh "${{ needs.validate.outputs.image_name }}:${{ github.ref_name }}" linux/amd64 linux/arm64

      - name: Smoke published platforms
        run: deployment/smoke-image-platforms.sh "${{ needs.validate.outputs.image_name }}:${{ github.ref_name }}"

  release:
    name: Create GitHub release
    needs:
      - validate
      - cli
      - app-image
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
      IMAGE_NAME: ${{ needs.validate.outputs.image_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download CLI archives
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          path: release-assets
          merge-multiple: true

      - name: Prepare release assets
        shell: bash
        run: |
          cp scripts/install-rowset-cli.sh release-assets/install-rowset-cli.sh
          (cd release-assets && sha256sum *.tar.gz > checksums.txt)

      - name: Publish release
        shell: bash
        run: |
          notes="$(mktemp)"
          {
            echo "Rowset release ${RELEASE_TAG}"
            echo
            echo "Docker image:"
            echo
            echo "- ${IMAGE_NAME}:${RELEASE_TAG}"
            echo
            echo "Install the CLI:"
            echo
            echo '```bash'
            echo "curl -fsSL https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/install-rowset-cli.sh | sh"
            echo '```'
          } > "$notes"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file "$notes"
          else
            gh release create "$RELEASE_TAG" release-assets/* --title "$RELEASE_TAG" --notes-file "$notes"
          fi
