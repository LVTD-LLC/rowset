name: Deploy Prod Server

on:
  push:
    branches:
      - main

concurrency:
  group: rowset-server-prod
  cancel-in-progress: true

env:
  PROJECT_NAME: rowset

jobs:
  deploy:
    name: Deploy server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CapRover deployment bundle
        run: |
          tmpdir="$(mktemp -d)"
          rsync -a --exclude .git ./ "$tmpdir/"
          printf '{"schemaVersion":2,"dockerfilePath":"./deployment/Dockerfile.server"}\n' > "$tmpdir/captain-definition"
          tar -C "$tmpdir" -cf /tmp/rowset-server.tar .

      - name: Deploy to CapRover
        env:
          CAPROVER_URL: ${{ secrets.CAPROVER_SERVER }}
          CAPROVER_APP_TOKEN: ${{ secrets.APP_TOKEN }}
        run: |
          npx -y -p node@20 -p caprover caprover deploy \
            --caproverUrl "$CAPROVER_URL" \
            --appToken "$CAPROVER_APP_TOKEN" \
            --caproverApp "${PROJECT_NAME}" \
            --tarFile /tmp/rowset-server.tar
