name: Deploy Prod

on:
  push:
    branches:
      - main

concurrency:
  group: rowset-prod
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  PROJECT_NAME: rowset
  CAPROVER_APP_NAME: rowset

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name and tags
        id: image
        shell: bash
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image_name=${image_name}" >> "$GITHUB_OUTPUT"
          echo "release_date=$(date -u +%F)" >> "$GITHUB_OUTPUT"
          echo "release_version=$(date -u +%F).${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.image_name }}:latest
            ${{ steps.image.outputs.image_name }}:${{ steps.image.outputs.release_date }}
            ${{ steps.image.outputs.image_name }}:${{ steps.image.outputs.release_version }}
            ${{ steps.image.outputs.image_name }}:${{ github.sha }}

      - name: Verify published platforms
        run: deployment/verify-image-platforms.sh "${{ steps.image.outputs.image_name }}:${{ github.sha }}" linux/amd64 linux/arm64

      - name: Smoke published platforms
        run: deployment/smoke-image-platforms.sh "${{ steps.image.outputs.image_name }}:${{ github.sha }}"

      - name: Deploy server to CapRover
        uses: caprover/deploy-from-github@v1.2.0
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: ${{ env.CAPROVER_APP_NAME }}
          token: ${{ secrets.APP_TOKEN }}
          image: ${{ steps.image.outputs.image_name }}:${{ github.sha }}

      - name: Deploy workers to CapRover
        uses: caprover/deploy-from-github@v1.2.0
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: ${{ env.CAPROVER_APP_NAME }}-workers
          token: ${{ secrets.WORKERS_APP_TOKEN }}
          image: ${{ steps.image.outputs.image_name }}:${{ github.sha }}
