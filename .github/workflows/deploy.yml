name: Deploy Prod

on:
  push:
    branches:
      - main

concurrency:
  group: rowset-prod
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  PROJECT_NAME: rowset
  CAPROVER_APP_NAME: rowset

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name and tags
        id: image
        shell: bash
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image_name=${image_name}" >> "$GITHUB_OUTPUT"
          echo "release_date=$(date -u +%F)" >> "$GITHUB_OUTPUT"
          echo "release_version=$(date -u +%F).${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image_name }}:latest
            ${{ steps.image.outputs.image_name }}:${{ steps.image.outputs.release_date }}
            ${{ steps.image.outputs.image_name }}:${{ steps.image.outputs.release_version }}
            ${{ steps.image.outputs.image_name }}:sha-${{ steps.image.outputs.short_sha }}

      - name: Install uv for deploy script
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Deploy server and workers to CapRover
        shell: bash
        env:
          CAPROVER_SERVER: ${{ secrets.CAPROVER_SERVER }}
          CAPROVER_PASSWORD: ${{ secrets.CAPROVER_PASSWORD }}
          IMAGE_NAME: ${{ steps.image.outputs.image_name }}:sha-${{ steps.image.outputs.short_sha }}
        run: |
          # CapRover pulls this prebuilt image at deploy time; GHCR packages must be public
          # or the CapRover host must have a ghcr.io registry credential configured.
          uv run --with caprover-api python - <<'PY'
          import json
          import os
          from caprover_api.caprover_api import CaproverAPI


          def deploy_prebuilt_image(cap, app_name, image_name):
              definition = {
                  "schemaVersion": cap.schema_version,
                  "imageName": image_name,
              }
              response = cap.session.post(
                  cap._build_url(CaproverAPI.APP_DATA_PATH) + f"/{app_name}",
                  headers=cap.headers,
                  data=json.dumps(
                      {
                          "captainDefinitionContent": json.dumps(definition),
                          "gitHash": "",
                      }
                  ),
              )
              CaproverAPI._check_errors(response.json())
              cap._wait_until_app_ready(app_name=app_name)
              cap._ensure_app_build_success(app_name=app_name)


          cap = CaproverAPI(os.environ["CAPROVER_SERVER"], os.environ["CAPROVER_PASSWORD"])
          image = os.environ["IMAGE_NAME"]
          app = os.environ["CAPROVER_APP_NAME"]
          deploy_prebuilt_image(cap, app, image)
          deploy_prebuilt_image(cap, f"{app}-workers", image)
          PY
