name: Deploy Prod

on:
  push:
    branches:
      - main

concurrency:
  group: rowset-prod
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  PROJECT_NAME: rowset
  CAPROVER_APP_NAME: rowset

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name and tags
        id: image
        shell: bash
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image_name=${image_name}" >> "$GITHUB_OUTPUT"
          echo "release_date=$(date -u +%F)" >> "$GITHUB_OUTPUT"
          echo "release_version=$(date -u +%F).${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image_name }}:latest
            ${{ steps.image.outputs.image_name }}:${{ steps.image.outputs.release_date }}
            ${{ steps.image.outputs.image_name }}:${{ steps.image.outputs.release_version }}
            ${{ steps.image.outputs.image_name }}:sha-${{ steps.image.outputs.short_sha }}

      - name: Deploy server and workers to CapRover
        shell: bash
        env:
          CAPROVER_SERVER: ${{ secrets.CAPROVER_SERVER }}
          CAPROVER_APP_TOKEN: ${{ secrets.APP_TOKEN }}
          CAPROVER_WORKERS_APP_TOKEN: ${{ secrets.WORKERS_APP_TOKEN }}
          IMAGE_NAME: ${{ steps.image.outputs.image_name }}:sha-${{ steps.image.outputs.short_sha }}
        run: |
          # CapRover pulls this prebuilt image at deploy time; GHCR packages must be public
          # or the CapRover host must have a ghcr.io registry credential configured.
          tmpdir="$(mktemp -d)"
          printf '{"schemaVersion":2,"imageName":"%s"}\n' "$IMAGE_NAME" > "$tmpdir/captain-definition"
          tar -C "$tmpdir" -cf /tmp/rowset-image.tar captain-definition

          npx -y -p node@20 -p caprover caprover deploy \
            --caproverUrl "$CAPROVER_SERVER" \
            --appToken "$CAPROVER_APP_TOKEN" \
            --caproverApp "$CAPROVER_APP_NAME" \
            --tarFile /tmp/rowset-image.tar

          npx -y -p node@20 -p caprover caprover deploy \
            --caproverUrl "$CAPROVER_SERVER" \
            --appToken "$CAPROVER_WORKERS_APP_TOKEN" \
            --caproverApp "${CAPROVER_APP_NAME}-workers" \
            --tarFile /tmp/rowset-image.tar
