<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">Rowset — any agent, any workflow, one backend</title>
  <desc id="description">Rowset social preview card with product message and a structured dataset illustration.</desc>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" />
    </pattern>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f2540" />
      <stop offset="1" stop-color="#07182c" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#1313a4" />
  <rect width="1200" height="630" fill="url(#grid)" />
  <rect x="0" y="0" width="18" height="630" fill="#ffdd3d" />

  <g font-family="Inter, Arial, sans-serif">
    <text x="72" y="78" fill="#ffffff" font-size="25" font-weight="700" letter-spacing="3">ROWSET</text>
    <text x="72" y="112" fill="#aebcff" font-size="16" font-weight="600" letter-spacing="2">THE BACKEND FOR AI AGENT WORKFLOWS</text>

    <text x="72" y="229" fill="#ffffff" font-size="64" font-weight="700" letter-spacing="-2">Any agent.</text>
    <text x="72" y="302" fill="#ffffff" font-size="64" font-weight="700" letter-spacing="-2">Any workflow.</text>
    <rect x="66" y="330" width="414" height="78" fill="#ffdd3d" />
    <text x="82" y="389" fill="#1313a4" font-size="61" font-weight="700" letter-spacing="-2">One backend.</text>

    <text x="72" y="487" fill="#dbe2ff" font-size="23">Private, searchable, structured data for trusted agents.</text>
    <g font-size="16" font-weight="700" letter-spacing="1">
      <rect x="72" y="528" width="84" height="38" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.32" />
      <text x="93" y="553" fill="#ffffff">MCP</text>
      <rect x="168" y="528" width="88" height="38" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.32" />
      <text x="187" y="553" fill="#ffffff">REST</text>
      <rect x="268" y="528" width="78" height="38" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.32" />
      <text x="289" y="553" fill="#ffffff">CLI</text>
    </g>
  </g>

  <g transform="translate(704 112)">
    <rect width="414" height="408" rx="36" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2" />
    <circle cx="42" cy="42" r="7" fill="#14c89a" />
    <circle cx="66" cy="42" r="7" fill="#27c7e8" />
    <circle cx="90" cy="42" r="7" fill="#ffdd3d" />
    <text x="302" y="49" fill="#91a2ba" font-family="ui-monospace, monospace" font-size="15">DATASET</text>

    <g transform="translate(38 90)">
      <rect width="338" height="242" rx="24" fill="#091b2d" stroke="#ffffff" stroke-opacity="0.08" />
      <g transform="translate(28 31)">
        <g>
          <circle cx="12" cy="12" r="12" fill="#14c89a" />
          <rect x="48" y="0" width="240" height="24" rx="12" fill="#f8fafc" />
        </g>
        <g transform="translate(0 54)">
          <circle cx="12" cy="12" r="12" fill="#14c89a" />
          <rect x="48" y="0" width="190" height="24" rx="12" fill="#f8fafc" />
          <rect x="226" y="0" width="62" height="24" rx="12" fill="#27c7e8" />
        </g>
        <g transform="translate(0 108)">
          <circle cx="12" cy="12" r="12" fill="#14c89a" />
          <rect x="48" y="0" width="240" height="24" rx="12" fill="#cbd5e1" />
          <circle cx="278" cy="12" r="12" fill="#14c89a" />
        </g>
        <g transform="translate(0 162)">
          <circle cx="12" cy="12" r="12" fill="#14c89a" />
          <rect x="48" y="0" width="240" height="24" rx="12" fill="#f8fafc" />
        </g>
      </g>
    </g>

    <g font-family="ui-monospace, monospace" font-size="14" font-weight="700">
      <text x="38" y="371" fill="#91a2ba">CREATE</text>
      <text x="120" y="371" fill="#91a2ba">SEARCH</text>
      <text x="210" y="371" fill="#91a2ba">UPDATE</text>
      <text x="300" y="371" fill="#ffdd3d">SHARE</text>
    </g>
  </g>
</svg>
