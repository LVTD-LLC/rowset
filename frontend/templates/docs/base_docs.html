{% extends 'base_app.html' %}

{% block content %}
<div class="mx-auto max-w-[1400px] px-4 py-10 sm:px-6 lg:px-8" data-controller="toc">
  <div class="flex flex-col gap-8 xl:flex-row xl:gap-12">
    <aside class="flex-shrink-0 xl:w-72" aria-label="Documentation sections">
      <nav class="sticky top-24 space-y-8 pb-8">
        {% for section in navigation %}
          <section class="space-y-3" aria-labelledby="docs-section-{{ forloop.counter }}">
            <h2 id="docs-section-{{ forloop.counter }}" class="px-4 text-xs font-black uppercase tracking-[0.22em] text-slate-500 dark:text-slate-400">{{ section.category }}</h2>
            <ul class="space-y-1">
              {% for page in section.pages %}
                <li>
                  <a href="{{ page.url }}" class="fb-focus block rounded-xl px-4 py-2.5 text-[15px] leading-snug transition {% if current_category == section.category_slug and current_page == page.slug %}bg-emerald-50 font-bold text-emerald-700 shadow-sm dark:bg-emerald-950/40 dark:text-emerald-300{% else %}text-slate-700 hover:bg-slate-100 hover:text-slate-950 dark:text-slate-300 dark:hover:bg-slate-800 dark:hover:text-white{% endif %}">{{ page.title }}</a>
                </li>
              {% endfor %}
            </ul>
          </section>
        {% endfor %}
      </nav>
    </aside>

    <main class="min-w-0 flex-1" id="docs-main-content">
      <article class="prose prose-lg max-w-none prose-slate prose-headings:font-black prose-a:text-emerald-700 prose-a:no-underline hover:prose-a:underline prose-code:rounded prose-code:bg-emerald-50 prose-code:px-1.5 prose-code:py-0.5 prose-code:text-emerald-700 prose-code:before:content-none prose-code:after:content-none prose-pre:rounded-2xl prose-pre:bg-slate-950 prose-pre:text-slate-100 prose-pre:shadow-sm dark:prose-invert dark:prose-a:text-emerald-300 dark:prose-code:bg-emerald-950/40 dark:prose-code:text-emerald-200 docs-code-blocks" data-toc-target="content">
        {% block docs_content %}{% endblock docs_content %}
      </article>
    </main>

    <aside class="hidden flex-shrink-0 xl:block xl:w-64" data-toc-target="sidebar" aria-label="Page table of contents">
      <nav class="sticky top-24 space-y-4">
        <h2 class="px-3 text-xs font-black uppercase tracking-[0.22em] text-slate-500 dark:text-slate-400">On this page</h2>
        <ul class="space-y-0" data-toc-target="list"></ul>
      </nav>
    </aside>
  </div>
</div>
{% endblock content %}
