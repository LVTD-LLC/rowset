{% extends 'base_landing.html' %}

{% block meta %}
<title>404 - Page not found | Rowset</title>
<meta name="description" content="The page you are looking for could not be found." />
<meta name="robots" content="noindex, follow" />
{% endblock meta %}

{% block content %}
<main class="grid min-h-[80vh] place-items-center px-6 py-24 sm:py-32 lg:px-8">
  <section class="fb-panel max-w-2xl p-8 text-center sm:p-12" aria-labelledby="not-found-heading">
    <p class="fb-label-caps text-emerald-600 dark:text-emerald-400">404</p>
    <h1 id="not-found-heading" class="mt-4 text-4xl font-black tracking-tight text-slate-900 sm:text-6xl dark:text-slate-100">Page not found</h1>
    <p class="fb-text-muted mt-6 text-lg leading-8">Sorry, we couldn’t find that page. It may have moved, or the link may be wrong.</p>
    <div class="mt-10 flex flex-col items-center justify-center gap-3 sm:flex-row">
      <a href="{% url 'landing' %}" class="fb-button-primary">Go home</a>
      <a href="mailto:rasul@lvtd.dev" class="fb-button-secondary">Contact support</a>
    </div>
  </section>
</main>
{% endblock content %}
