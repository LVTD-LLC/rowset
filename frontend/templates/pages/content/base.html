{% extends docs_base_template %}
{% block content %}
    <div class="mx-auto max-w-6xl px-4 py-8 sm:px-6 lg:px-8" x-data="docsToc">
        <div class="flex flex-col gap-8 xl:flex-row xl:gap-10">
            <aside class="flex-shrink-0 xl:w-64" aria-label="{{ section.label }} pages">
                <nav class="sticky top-20 space-y-7 pb-8">
                    <section class="space-y-3" aria-labelledby="docs-section-home">
                        <h2 id="docs-section-home"
                            class="px-3 text-sm font-semibold text-slate-950 dark:text-slate-100">Explore</h2>
                        <ul class="space-y-1">
                            <li>
                                <a href="{% url 'docs_home' %}"
                                   class="fb-focus block rounded-md px-3 py-2 text-sm leading-snug text-slate-600 transition hover:bg-slate-100 hover:text-slate-950 dark:text-slate-300 dark:hover:bg-slate-900 dark:hover:text-white">Docs home</a>
                            </li>
                            <li>
                                <a href="{% url 'blog_posts' %}"
                                   class="fb-focus block rounded-md px-3 py-2 text-sm leading-snug text-slate-600 transition hover:bg-slate-100 hover:text-slate-950 dark:text-slate-300 dark:hover:bg-slate-900 dark:hover:text-white">Blog</a>
                            </li>
                        </ul>
                    </section>
                    <section class="space-y-3" aria-labelledby="docs-section-current">
                        <h2 id="docs-section-current"
                            class="px-3 text-sm font-semibold text-slate-950 dark:text-slate-100">{{ section.label }}</h2>
                        <ul class="space-y-1">
                            {% for page in section.pages %}
                                <li>
                                    <a href="{{ page.url }}"
                                       class="fb-focus block rounded-md px-3 py-2 text-sm leading-snug transition {% if current_page == page.slug %}bg-emerald-50 font-semibold text-emerald-800 dark:bg-emerald-950/40 dark:text-emerald-200{% else %}text-slate-600 hover:bg-slate-100 hover:text-slate-950 dark:text-slate-300 dark:hover:bg-slate-900 dark:hover:text-white{% endif %}">{{ page.title }}</a>
                                </li>
                            {% endfor %}
                        </ul>
                    </section>
                </nav>
            </aside>
            <main class="min-w-0 flex-1" id="docs-main-content">
                <article x-ref="content"
                         class="prose prose-slate max-w-none prose-headings:font-semibold prose-headings:tracking-tight prose-a:text-emerald-700 prose-a:no-underline hover:prose-a:underline prose-code:rounded prose-code:bg-transparent prose-code:px-0 prose-code:py-0 prose-code:text-slate-800 prose-code:before:content-none prose-code:after:content-none prose-pre:my-0 prose-pre:overflow-x-auto prose-pre:rounded-lg prose-pre:bg-slate-950 prose-pre:p-5 prose-pre:pr-20 prose-pre:text-slate-100 dark:prose-invert dark:prose-a:text-emerald-300 dark:prose-code:bg-transparent dark:prose-code:text-slate-100 docs-code-blocks">
                    {% block docs_content %}
                    {% endblock docs_content %}
                </article>
            </main>
            <aside x-ref="sidebar"
                   class="hidden flex-shrink-0 xl:block xl:w-56"
                   aria-label="Page table of contents">
                <nav class="sticky top-20 space-y-4">
                    <h2 class="px-3 text-sm font-semibold text-slate-950 dark:text-slate-100">On this page</h2>
                    <ul class="space-y-0" x-ref="list">
                    </ul>
                </nav>
            </aside>
        </div>
    </div>
{% endblock content %}
