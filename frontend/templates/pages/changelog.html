{% extends docs_base_template %}
{% block meta %}
    <title>Changelog · Rowset</title>
    <meta name="description" content="See the latest Rowset features, improvements, fixes, and security updates." />
    <meta name="robots" content="{{ search_robots_policy }}" />
    <link rel="canonical" href="{{ canonical_url }}" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Changelog · Rowset" />
    <meta property="og:description" content="See the latest Rowset features, improvements, fixes, and security updates." />
    <meta property="og:url" content="{{ canonical_url }}" />
    <meta name="twitter:title" content="Changelog · Rowset" />
    <meta name="twitter:description" content="See the latest Rowset features, improvements, fixes, and security updates." />
{% endblock meta %}
{% block content %}
    <article class="bg-white text-slate-950 dark:bg-neutral-950 dark:text-white">
        <header class="border-b border-white/20 bg-[#1313a4] text-white">
            <div class="mx-auto max-w-3xl px-4 py-14 sm:px-6 lg:px-8 lg:py-20">
                <p class="font-mono text-sm font-semibold uppercase tracking-wide text-[#ffdd3d]">Product updates</p>
                <p class="mt-6 max-w-[42ch] text-xl text-pretty text-blue-100">New features, improvements, fixes, and security updates shipped in Rowset.</p>
            </div>
        </header>
        <div class="mx-auto max-w-3xl px-4 py-14 sm:px-6 lg:px-8 lg:py-20">
            <div class="prose max-w-none prose-headings:font-semibold prose-headings:tracking-tight prose-a:text-[#1313a4] prose-pre:bg-neutral-950 prose-pre:text-white dark:prose-invert dark:prose-a:text-[#ffdd3d]">{{ changelog_html|safe }}</div>
        </div>
    </article>
{% endblock content %}
