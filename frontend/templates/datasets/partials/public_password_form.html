<section class="mx-auto max-w-md rounded-lg border border-slate-200 bg-white p-6 dark:border-slate-800 dark:bg-slate-950" aria-labelledby="password-required-heading">
  <p class="fb-label-caps text-emerald-600 dark:text-emerald-400">Protected table</p>
  <h1 id="password-required-heading" class="mt-2 text-xl font-semibold text-slate-950 dark:text-slate-100">Password required</h1>
  <p class="mt-1 text-sm leading-6 text-slate-600 dark:text-slate-300">Enter the password to view this shared table.</p>
  <form method="post" class="mt-5 space-y-4">
    {% csrf_token %}
    <div>
      <label for="public-dataset-password" class="block text-sm font-semibold text-slate-900 dark:text-slate-100">Table password</label>
      <input id="public-dataset-password" name="password" type="password" autocomplete="current-password" autofocus aria-describedby="{% if password_error %}public-password-error{% else %}public-password-help{% endif %}" class="fb-input mt-2 w-full px-3 py-2 text-sm">
      {% if password_error %}<p id="public-password-error" class="mt-2 text-sm text-red-600 dark:text-red-400">{{ password_error }}</p>{% else %}<p id="public-password-help" class="mt-2 text-xs text-slate-500 dark:text-slate-400">Ask the dataset owner for access if you do not have the password.</p>{% endif %}
    </div>
    <button type="submit" class="fb-button-primary">{% firstof password_submit_label "View table" %}</button>
  </form>
</section>
