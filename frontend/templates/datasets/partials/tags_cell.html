{% if cell.row_url %}
  <a href="{{ cell.row_url }}" class="fb-focus flex max-w-64 flex-wrap gap-1" title="{{ cell.value }}"{% if cell.is_row_detail_primary %} aria-label="{{ cell.row_detail_label }}"{% else %} aria-hidden="true" tabindex="-1"{% endif %}>
    {% for tag in cell.tags %}
      <span class="fb-choice-pill {% if tag.accent_class %}{{ tag.accent_class }}{% else %}border-slate-200 bg-slate-50 text-slate-700 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200{% endif %}">{{ tag.value }}</span>
    {% endfor %}
  </a>
{% else %}
  <span class="flex max-w-64 flex-wrap gap-1" title="{{ cell.value }}">
    {% for tag in cell.tags %}
      <span class="fb-choice-pill {% if tag.accent_class %}{{ tag.accent_class }}{% else %}border-slate-200 bg-slate-50 text-slate-700 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200{% endif %}">{{ tag.value }}</span>
    {% endfor %}
  </span>
{% endif %}
