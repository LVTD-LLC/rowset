<a href="{{ cell.rowset_link_url }}" class="fb-focus inline-flex {{ rowset_link_width|default:'max-w-full' }} items-center gap-1.5 truncate rounded-md border border-emerald-200 bg-emerald-50 px-2 py-1 text-xs font-semibold text-emerald-800 hover:border-emerald-300 hover:bg-emerald-100 dark:border-emerald-900 dark:bg-emerald-950/50 dark:text-emerald-200 dark:hover:bg-emerald-900/50" title="{{ cell.value }}" aria-label="{{ cell.rowset_link_label }}">
  <svg class="h-3.5 w-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round" d="M4 5.5h16M4 12h16M4 18.5h16M8 4v16M16 4v16" />
  </svg>
  <span class="truncate">{{ cell.rowset_link_text }}</span>
  {% if cell.rowset_link_detail %}
    <span class="hidden shrink-0 text-xs font-medium text-emerald-700/75 dark:text-emerald-300/75 sm:inline">{{ cell.rowset_link_detail }}</span>
  {% endif %}
</a>
