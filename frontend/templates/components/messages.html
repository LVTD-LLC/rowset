{% if messages %}
<div class="fixed inset-x-4 top-4 z-50 space-y-3 sm:left-auto sm:right-4 sm:w-full sm:max-w-sm" data-controller="reveal">
  {% for message in messages %}
  <div
    data-reveal-target="item"
    data-message-id="{{ forloop.counter }}"
    role="{% if message.tags == 'error' %}alert{% else %}status{% endif %}"
    class="translate-x-full transform rounded-2xl border p-4 opacity-0 shadow-lg transition-all duration-300 ease-in-out {% if message.tags == 'error' %}border-red-200 bg-red-50 text-red-900 dark:border-red-900/60 dark:bg-red-950 dark:text-red-100{% else %}border-emerald-200 bg-emerald-50 text-emerald-950 dark:border-emerald-900/60 dark:bg-emerald-950 dark:text-emerald-100{% endif %}"
  >
    <div class="flex items-start gap-3">
      <div class="mt-0.5 flex-shrink-0" aria-hidden="true">
        {% if message.tags == 'error' %}
          <svg class="h-5 w-5 text-red-600 dark:text-red-300" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16Zm-1-5a1 1 0 112 0 1 1 0 01-2 0Zm.25-7.25a.75.75 0 011.5 0v4.5a.75.75 0 01-1.5 0v-4.5Z" clip-rule="evenodd" />
          </svg>
        {% else %}
          <svg class="h-5 w-5 text-emerald-600 dark:text-emerald-300" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16Zm3.857-9.809a.75.75 0 00-1.214-.882l-3.236 4.45-1.55-1.55a.75.75 0 10-1.06 1.061l2.17 2.17a.75.75 0 001.137-.089l3.753-5.16Z" clip-rule="evenodd" />
          </svg>
        {% endif %}
      </div>
      <p class="min-w-0 flex-1 text-sm leading-6">{{ message }}</p>
      <button data-action="click->reveal#hide" data-message-id="{{ forloop.counter }}" type="button" class="fb-focus inline-flex h-7 w-7 flex-shrink-0 items-center justify-center rounded-full {% if message.tags == 'error' %}text-red-700 hover:bg-red-100 dark:text-red-200 dark:hover:bg-red-900/60{% else %}text-emerald-700 hover:bg-emerald-100 dark:text-emerald-200 dark:hover:bg-emerald-900/60{% endif %}">
        <span class="sr-only">Dismiss notification</span>
        <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  </div>
  {% endfor %}
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const items = document.querySelectorAll('[data-reveal-target="item"]');
    items.forEach((item, index) => {
      setTimeout(() => {
        item.classList.remove("opacity-0", "translate-x-full");
        if (item.getAttribute("role") !== "alert") {
          startTimer(item);
        }
      }, index * 100);
    });
  });

  function startTimer(item) {
    let progress = 0;
    const interval = setInterval(() => {
      if (item.matches(":hover, :focus-within")) {
        return;
      }
      if (progress >= 160) {
        clearInterval(interval);
        hideMessage(item);
      } else {
        progress++;
      }
    }, 50);
  }

  function hideMessage(item) {
    item.classList.add("opacity-0", "translate-x-full");
    setTimeout(() => {
      item.remove();
    }, 300);
  }

  document.addEventListener("click", (event) => {
    const dismissButton = event.target.closest('[data-action="click->reveal#hide"]');
    if (!dismissButton) return;
    const messageId = dismissButton.getAttribute("data-message-id");
    const item = document.querySelector(`[data-reveal-target="item"][data-message-id="${messageId}"]`);
    if (item) {
      hideMessage(item);
    }
  });
</script>
{% endif %}
