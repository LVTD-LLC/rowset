<div class="not-prose relative"
     x-data="aiReaderMenu"
     data-ai-reader-menu
     data-markdown-url="{{ markdown_url }}"
     data-prompt="{{ ai_reader_prompt }}"
     @click.outside="open = false"
     @keydown.escape.window="if (open) { open = false; $refs.trigger.focus(); }">
    <button type="button"
            x-ref="trigger"
            class="fb-button-secondary inline-flex items-center gap-2"
            aria-haspopup="menu"
            :aria-expanded="open.toString()"
            @click="open = !open">
        AI reader
        <span aria-hidden="true">▾</span>
    </button>
    <div x-cloak
         x-show="open"
         role="menu"
         class="absolute right-0 z-20 mt-2 w-56 border border-slate-300 bg-white p-1 text-sm text-slate-950 dark:border-slate-700 dark:bg-slate-950 dark:text-white">
        <a href="{{ chatgpt_url }}"
           role="menuitem"
           class="fb-focus block px-3 py-2 font-medium hover:bg-slate-100 dark:hover:bg-slate-800"
           @click="open = false">Open in ChatGPT</a>
        <a href="{{ claude_url }}"
           role="menuitem"
           class="fb-focus block px-3 py-2 font-medium hover:bg-slate-100 dark:hover:bg-slate-800"
           @click="open = false">Open in Claude</a>
        <button type="button"
                role="menuitem"
                class="fb-focus block w-full px-3 py-2 text-left font-medium hover:bg-slate-100 disabled:opacity-50 dark:hover:bg-slate-800"
                :disabled="busy"
                @click="copyPrompt()">Copy prompt</button>
        <button type="button"
                role="menuitem"
                class="fb-focus block w-full px-3 py-2 text-left font-medium hover:bg-slate-100 disabled:opacity-50 dark:hover:bg-slate-800"
                :disabled="busy"
                @click="copyMarkdown()">Copy Markdown</button>
    </div>
    <p class="mt-2 min-h-5 text-sm text-slate-600 dark:text-slate-300"
       role="status"
       aria-live="polite"
       x-text="status"></p>
</div>
