<div class="not-prose relative"
     x-data="aiReaderMenu"
     data-ai-reader-menu
     data-markdown-url="{{ markdown_url }}"
     data-prompt="{{ ai_reader_prompt }}"
     @click.outside="open = false"
     @keydown.escape.window="if (open) { open = false; $refs.trigger.focus(); }">
    <button type="button"
            x-ref="trigger"
            class="{% if ai_reader_menu_variant == 'on_dark' %}fb-focus inline-flex min-h-10 items-center justify-center gap-2 rounded-md border border-white/40 bg-transparent px-3 py-2 text-sm font-semibold text-white hover:bg-white hover:text-[#1313a4]{% else %}fb-button-secondary inline-flex items-center gap-2{% endif %}"
            aria-haspopup="menu"
            :aria-expanded="open.toString()"
            @click="open = !open">Read with AI</button>
    <div x-cloak
         x-show="open"
         role="menu"
         class="absolute right-0 z-20 mt-2 w-64 border border-slate-300 bg-white p-1 text-base text-slate-950 dark:border-slate-700 dark:bg-slate-950 dark:text-white sm:w-56 sm:text-sm">
        <a href="{{ claude_url }}"
           target="_blank"
           rel="noopener"
           role="menuitem"
           class="fb-focus block px-3 py-2 font-medium hover:bg-slate-100 dark:hover:bg-slate-800"
           @click="open = false">Read with Claude</a>
        <a href="{{ chatgpt_url }}"
           target="_blank"
           rel="noopener"
           role="menuitem"
           class="fb-focus block px-3 py-2 font-medium hover:bg-slate-100 dark:hover:bg-slate-800"
           @click="open = false">Read with ChatGPT</a>
        <button type="button"
                role="menuitem"
                class="fb-focus block w-full px-3 py-2 text-left font-medium hover:bg-slate-100 disabled:opacity-50 dark:hover:bg-slate-800"
                :disabled="busy"
                @click="copyPrompt()">Copy Prompt for your AI Agent</button>
        <button type="button"
                role="menuitem"
                class="fb-focus block w-full px-3 py-2 text-left font-medium hover:bg-slate-100 disabled:opacity-50 dark:hover:bg-slate-800"
                :disabled="busy"
                @click="copyMarkdown()">Copy Markdown</button>
    </div>
    <p class="mt-2 min-h-5 text-base leading-7 sm:text-sm sm:leading-6 {% if ai_reader_menu_variant == 'on_dark' %}text-white/70{% else %}text-slate-600 dark:text-slate-300{% endif %}"
       role="status"
       aria-live="polite"
       x-text="status"></p>
</div>
