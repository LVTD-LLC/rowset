<div x-data="commandPalette"
     x-cloak
     x-show="open"
     class="fixed inset-0 z-50"
     data-command-palette
     @command-palette:open.window="openPalette($event)"
     @keydown.window="handleGlobalKeydown($event)"
     @keydown.tab="trapFocus($event)">
    <div x-show="open"
         x-transition:enter="transition duration-150 ease-out motion-reduce:transition-none"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition duration-150 ease-out motion-reduce:transition-none"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="absolute inset-0 bg-slate-950/35 backdrop-blur-sm dark:bg-slate-950/60"
         @click="closePalette()"></div>
    <div class="relative flex min-h-full items-start justify-center px-3 pb-6 pt-[12svh] sm:px-6">
        <section x-ref="panel"
                 role="dialog"
                 aria-modal="true"
                 aria-labelledby="public-content-search-heading"
                 x-show="open"
                 x-transition:enter="transition duration-200 ease-out motion-reduce:transition-none"
                 x-transition:enter-start="translate-y-3 scale-[0.98] opacity-0 blur-sm"
                 x-transition:enter-end="translate-y-0 scale-100 opacity-100 blur-0"
                 x-transition:leave="transition duration-150 ease-in motion-reduce:transition-none"
                 x-transition:leave-start="translate-y-0 scale-100 opacity-100 blur-0"
                 x-transition:leave-end="translate-y-2 scale-[0.99] opacity-0 blur-sm"
                 class="w-full max-w-2xl overflow-hidden rounded-lg border border-slate-200 bg-white text-slate-950 dark:border-slate-800 dark:bg-slate-950 dark:text-slate-100"
                 @click.stop>
            <form method="get" action="{% url 'public_content_search' %}">
                <div class="border-b border-slate-200 dark:border-slate-800">
                    <h2 id="public-content-search-heading" class="sr-only">Search Rowset</h2>
                    <div class="flex items-center gap-3 px-4 py-3">
                        <svg class="h-5 w-5 flex-shrink-0 text-slate-500 dark:text-slate-400"
                             viewBox="0 0 24 24"
                             fill="none"
                             stroke="currentColor"
                             stroke-width="2"
                             aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-4.35-4.35" />
                            <circle cx="11" cy="11" r="7" />
                        </svg>
                        <input x-ref="input"
                               name="q"
                               type="search"
                               autocomplete="off"
                               spellcheck="false"
                               role="combobox"
                               aria-controls="command-palette-results"
                               aria-label="Search docs, blog, and use cases"
                               :aria-expanded="open.toString()"
                               :aria-activedescendant="activeResultId || null"
                               placeholder="Search docs, blog, and use cases"
                               class="block min-h-11 min-w-0 flex-1 border-0 bg-transparent px-0 text-base text-slate-950 placeholder:text-slate-500 focus:outline-none focus:ring-0 dark:text-slate-100 dark:placeholder:text-slate-400"
                               hx-get="{% url 'public_content_search' %}"
                               hx-trigger="input changed delay:220ms, search"
                               hx-target="#command-palette-results"
                               hx-swap="innerHTML"
                               hx-sync="this:replace"
                               hx-indicator="#public-content-search-loading"
                               hx-push-url="false"
                               hx-history="false"
                               @input="clearSelection()"
                               @keydown.arrow-down.prevent="moveSelection(1)"
                               @keydown.arrow-up.prevent="moveSelection(-1)"
                               @keydown.enter.prevent="openActiveResult()" />
                        <div id="public-content-search-loading"
                             class="htmx-indicator text-xs font-semibold text-slate-500 dark:text-slate-400"
                             aria-live="polite">Searching</div>
                        <button type="button"
                                class="fb-focus inline-flex h-8 w-8 flex-shrink-0 items-center justify-center rounded-md text-slate-500 transition hover:bg-slate-100 hover:text-slate-950 dark:text-slate-400 dark:hover:bg-slate-900 dark:hover:text-slate-100"
                                aria-label="Close search"
                                @click="closePalette()">
                            <svg class="h-4 w-4"
                                 viewBox="0 0 24 24"
                                 fill="none"
                                 stroke="currentColor"
                                 stroke-width="2"
                                 aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div id="command-palette-results"
                     role="listbox"
                     aria-label="Public content search results"
                     class="max-h-[min(32rem,62svh)] overflow-y-auto p-2">
                    {% include "pages/partials/public_content_search_results.html" with query="" %}
                </div>
            </form>
        </section>
    </div>
</div>
