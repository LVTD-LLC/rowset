{% if not email_verified %}
<div class="rounded-lg border border-amber-200 bg-amber-50 p-4 text-amber-900 dark:border-amber-900/60 dark:bg-amber-950/40 dark:text-amber-100" role="status" aria-live="polite">
  <div class="flex gap-3">
    <div class="flex-shrink-0" aria-hidden="true">
      <svg class="h-5 w-5 text-amber-500 dark:text-amber-300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M8.485 3.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 3.495zM10 6a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 0110 6zm0 8a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd" />
      </svg>
    </div>
    <div>
      <h2 class="text-sm font-bold">Confirm your email</h2>
      <form method="post" action="{{ resend_confirmation_url }}" class="mt-1 text-sm leading-6">
        {% csrf_token %}
        <span>Your email is not yet confirmed. You should have a confirmation link in your inbox.</span>
        <button type="submit" class="fb-focus rounded-full font-bold underline decoration-amber-600 underline-offset-2 hover:text-amber-700 dark:hover:text-amber-200">Re-send verification</button>
      </form>
    </div>
  </div>
</div>
{% endif %}
