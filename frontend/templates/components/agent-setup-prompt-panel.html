<div
  class="{{ agent_setup_prompt_panel_class|default:'mt-7' }} rounded-lg border border-slate-200 bg-slate-950 p-4 dark:border-slate-800"
  x-data="{ promptVisible: false }"
>
  <div class="flex flex-col gap-3 border-b border-slate-800 pb-4 lg:flex-row lg:items-start lg:justify-between">
    <div>
      <h2 class="text-base font-semibold text-white">Copy/paste prompt</h2>
      <p id="{{ agent_setup_prompt_help_id }}" class="mt-1 text-sm leading-6 text-slate-400">Includes MCP, CLI, and REST details so your agent can recommend the best fit.</p>
    </div>
    <div
      class="flex flex-col gap-2 sm:flex-row sm:items-center lg:justify-end"
      x-data="copyPanel"
      data-copy-url="{{ agent_setup_prompt_url }}"
      data-copy-response-key="prompt"
      data-copy-label="Copy agent prompt"
      data-copy-tracking-event="rowset_agent_setup_prompt_copied"
      data-copy-success-event="agent-setup-prompt-copied"
    >
      <button
        type="button"
        @click="promptVisible = !promptVisible"
        :aria-expanded="promptVisible"
        aria-controls="{{ agent_setup_prompt_help_id }}-prompt"
        class="fb-button-secondary whitespace-nowrap"
      >
        <span x-text="promptVisible ? &#x27;Hide prompt&#x27; : &#x27;Show prompt&#x27;">Show prompt</span>
      </button>
      <button type="button" @click="copy" :disabled="busy" class="fb-button-primary whitespace-nowrap">
        <span x-ref="label" x-text="label">Copy agent prompt</span>
      </button>
    </div>
  </div>
  <pre id="{{ agent_setup_prompt_help_id }}-prompt" x-ref="source" x-cloak x-show="promptVisible" aria-describedby="{{ agent_setup_prompt_help_id }} {{ agent_setup_prompt_warning_id }}" class="mt-4 min-h-48 overflow-x-auto whitespace-pre-wrap break-words rounded-md border border-slate-800 bg-slate-900 p-4 font-mono text-xs leading-5 text-slate-100">{{ agent_setup_prompt_masked }}</pre>
</div>
<p id="{{ agent_setup_prompt_warning_id }}" class="mt-3 text-sm font-semibold text-amber-700 dark:text-amber-300">Only share this prompt with agents and people you trust.</p>
