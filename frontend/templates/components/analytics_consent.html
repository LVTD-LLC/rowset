{% if posthog_api_key %}
<aside data-analytics-consent hidden class="fixed inset-x-4 bottom-4 z-50 mx-auto max-w-2xl rounded-lg border border-slate-200 bg-white p-4 shadow-xl dark:border-slate-700 dark:bg-slate-900" aria-label="Analytics preferences">
  <p class="text-sm text-slate-700 dark:text-slate-200">May we use privacy-conscious analytics to understand which campaigns and product flows work? We do not collect dataset contents.</p>
  <div class="mt-3 flex gap-2">
    <button type="button" data-analytics-consent-accept class="fb-focus rounded-md bg-emerald-600 px-3 py-2 text-sm font-semibold text-white">Allow analytics</button>
    <button type="button" data-analytics-consent-decline class="fb-focus rounded-md border border-slate-300 px-3 py-2 text-sm font-semibold dark:border-slate-600">Decline</button>
  </div>
</aside>
{% endif %}
