<div
  x-data="feedbackWidget"
  class="fixed bottom-3 right-3 z-50 md:bottom-6 md:right-6"
  @keydown.escape.window="open && closeFeedback()"
>
  <button
    type="button"
    @click="toggleFeedback()"
    class="fb-focus flex h-12 w-12 items-center justify-center rounded-md bg-emerald-600 text-white transition hover:bg-emerald-700 md:h-14 md:w-14"
    aria-label="Provide feedback"
    aria-haspopup="dialog"
    :aria-expanded="open.toString()"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
    </svg>
  </button>

  <div
    x-cloak
    x-show="open"
    x-transition.opacity
    @click.self="closeFeedback()"
    class="fixed inset-0 z-40 flex items-center justify-center bg-slate-950/60 p-4 transition-opacity duration-300"
  >
    <div
      :class="open ? 'scale-100' : 'scale-95'"
      class="w-full max-w-md scale-95 rounded-lg border border-slate-200 bg-white p-6 transition-transform duration-200 dark:border-slate-800 dark:bg-slate-950"
      role="dialog"
      aria-modal="true"
      aria-labelledby="feedback-heading"
    >
      <h2 id="feedback-heading" class="text-lg font-bold text-slate-900 dark:text-slate-100">Share feedback</h2>
      <p class="fb-text-muted mt-1 text-sm leading-6">Tell us what broke, confused you, or would make Rowset more useful.</p>

      <form @submit="submitFeedback($event)" class="mt-5 space-y-4">
        {% csrf_token %}
        <div>
          <label for="feedback-message" class="block text-sm font-semibold text-slate-900 dark:text-slate-100">Feedback</label>
          <textarea
            id="feedback-message"
            x-ref="feedbackInput"
            x-model="feedback"
            @keydown.enter="if (!$event.shiftKey) { $event.preventDefault(); submitFeedback($event); }"
            class="fb-input mt-2 w-full px-3 py-2 text-sm"
            rows="4"
            maxlength="2000"
            aria-describedby="feedback-help"
            placeholder="What’s on your mind?"
            required
          ></textarea>
          <p id="feedback-help" class="mt-2 text-xs leading-5 text-slate-600 dark:text-slate-300">Up to 2,000 characters.</p>
        </div>

        <div class="flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
          <button type="button" @click="closeFeedback()" class="fb-button-secondary">Cancel</button>
          <button type="submit" x-ref="submit" :disabled="submitting" :aria-disabled="submitting.toString()" x-text="submitting ? 'Sending...' : submitLabel" class="fb-button-primary">Send feedback</button>
        </div>
      </form>
    </div>
  </div>
</div>
