<div data-controller="feedback" class="fixed bottom-3 right-3 z-50 md:bottom-6 md:right-6">
  <button
    data-feedback-target="toggleButton"
    data-action="click->feedback#toggleFeedback"
    class="fb-focus flex h-12 w-12 items-center justify-center rounded-full bg-emerald-500 text-slate-950 shadow-lg transition hover:bg-emerald-400 md:h-14 md:w-14"
    aria-label="Provide feedback"
    aria-haspopup="dialog"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
    </svg>
  </button>

  <div
    data-feedback-target="overlay"
    data-action="click->feedback#closeIfClickedOutside"
    class="pointer-events-none fixed inset-0 z-40 flex items-center justify-center bg-slate-950/60 p-4 opacity-0 transition-opacity duration-300"
  >
    <div
      data-feedback-target="formContainer"
      class="w-full max-w-md scale-95 rounded-2xl border border-slate-200 bg-white p-6 shadow-xl transition-transform duration-300 dark:border-slate-800 dark:bg-slate-900"
      role="dialog"
      aria-modal="true"
      aria-labelledby="feedback-heading"
    >
      <h2 id="feedback-heading" class="text-lg font-bold text-slate-900 dark:text-slate-100">Share feedback</h2>
      <p class="fb-text-muted mt-1 text-sm leading-6">Tell us what broke, confused you, or would make FileBridge more useful.</p>

      <form data-action="submit->feedback#submitFeedback" class="mt-5 space-y-4">
        <div>
          <label for="feedback-message" class="block text-sm font-semibold text-slate-900 dark:text-slate-100">Feedback</label>
          <textarea
            id="feedback-message"
            data-feedback-target="feedbackInput"
            class="fb-input mt-2 w-full px-3 py-2 text-sm"
            rows="4"
            placeholder="What’s on your mind?"
            required
          ></textarea>
        </div>

        <div class="flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
          <button type="button" data-action="click->feedback#closeFeedback" class="fb-button-secondary">Cancel</button>
          <button type="submit" class="fb-button-primary">Send feedback</button>
        </div>
      </form>
    </div>
  </div>
</div>
