{% extends 'base_landing.html' %}

{% block meta %}
<title>Password changed · Rowset</title>
{% endblock meta %}

{% block content %}
<div class="flex justify-center px-4 py-16 sm:px-6 lg:px-8">
  <section class="fb-card w-full max-w-md p-6 text-center sm:p-8" aria-labelledby="password-changed-heading">
    <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-full bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-200" aria-hidden="true">
      <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
    </div>
    <h1 id="password-changed-heading" class="mt-6 text-3xl font-black tracking-tight text-slate-900 dark:text-slate-100">Password changed</h1>
    <p class="fb-text-muted mt-4 text-sm leading-6">You can now sign in with your new password.</p>
    <a href="{% url 'account_login' %}" class="fb-button-primary mt-8">Sign in</a>
  </section>
</div>
{% endblock content %}
